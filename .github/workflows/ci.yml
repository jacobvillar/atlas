name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check required project docs
        run: |
          test -f README.md
          test -f docs/idea-validation.md
          test -f docs/prd.md
          test -f spec.md
          test -f docs/architecture.md
          test -f CLAUDE.md
          test -f .cursorrules
      - name: Check forbidden positioning language
        run: |
          ! grep -RniE "Better-ed|better-ed|inspired by|instead of assessing|student understanding" .
      - name: Check secrets are not committed
        run: |
          ! grep -RniE "sk-[A-Za-z0-9]|ANTHROPIC_API_KEY=.*[A-Za-z0-9]|OPENAI_API_KEY=.*[A-Za-z0-9]" . --exclude-dir=.git
