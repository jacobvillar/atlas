name: CI

on:
  push:
    branches: [main, feat/atlas-mvp]
  pull_request:
    branches: [main, feat/atlas-mvp]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        # Dummy public env values only — the build never needs real secrets.
        # OPENAI_API_KEY is intentionally left unset so the live AI tests
        # (openai.live.test.ts, role-profile.live.test.ts) self-skip below.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
        run: npm run build
      - name: Test
        # No OPENAI_API_KEY and no .env.local in CI, so the two live AI
        # integration tests detect no key and report as skipped, not failed.
        run: npx vitest --run

  document-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/knowledge/document-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/knowledge/document-service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test
        # tests/test_validation.py covers app.validation only (file type,
        # size limits) and needs no network or secrets.
        run: pytest -q

  rag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/knowledge/rag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/knowledge/rag/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test
        # tests/test_chunking.py covers app.ingestion.chunker/parser only
        # (pure text chunking + frontmatter parsing). It needs no network or
        # secrets. scripts/load_career_resources.py (OpenAI + Supabase
        # ingestion) is offline/admin tooling, is not under tests/, and is
        # intentionally excluded from CI per its own module docstring.
        run: pytest -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
