name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          ! git grep -nE "sk-[A-Za-z0-9]{20,}|ANTHROPIC_API_KEY=.*[A-Za-z0-9]{20,}|OPENAI_API_KEY=.*[A-Za-z0-9]{20,}" -- \
            . \
            ':(exclude).env.example' \
            ':(exclude).github/workflows/ci.yml'
