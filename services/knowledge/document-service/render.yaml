services:
  - type: web
    name: atlas-document-service
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DOCUMENT_SERVICE_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "5"
